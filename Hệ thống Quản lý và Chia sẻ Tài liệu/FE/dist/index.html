  <script>
    // Áp dụng theme đã lưu NGAY LẬP TỨC, trước khi React render, để tránh
    // nhấp nháy sai giao diện mỗi khi chuyển trang (dự án dùng <a href> nên
    // mỗi lần chuyển trang là tải lại toàn bộ document, không phải điều hướng SPA).
    (function () {
      try {
        if (localStorage.getItem('theme') === 'light') {
          document.documentElement.classList.add('light-theme')
        }
      } catch (e) {
        // localStorage có thể bị chặn (chế độ ẩn danh nghiêm ngặt...): bỏ qua, dùng mặc định (tối)
      }
    })()
  </script>
